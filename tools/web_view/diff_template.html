<!DOCTYPE html>
<html lang="en-us"><head>
<title>
{INSERT_TITLE}
</title>
<meta charset="utf-8">
   <!--DOCUMENTATION: https://github.com/rtfpessoa/diff2html#features -->

   <!-- LINKS TO EXTERNAL REFERENCES
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.7.1/styles/github.min.css" />
   <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css" />
   <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
   -->

   <!--Make sure to load the CSS file in that order-->
   <link rel="stylesheet" type="text/css" href="{WEB_VIEW_FOLDER}/lib/highlight.js_github.min.css" />
   <link rel="stylesheet" type="text/css" href="{WEB_VIEW_FOLDER}/lib/diff2html.min.css" />
   <link rel="stylesheet" type="text/css" href="{WEB_VIEW_FOLDER}/optitrust_diff.css" />
   <script type="text/javascript" src="{WEB_VIEW_FOLDER}/lib/diff2html-ui.min.js"></script>
   <script type="module" src="{WEB_VIEW_FOLDER}/optitrust_syntax_highlight.js"></script>

<script>
   var diffStrings = { cpp: "" };
   var selectedDiffRepresentation = "cpp";

   {INSERT_DIFF}

   function diffLabel(representation) {
     if (representation === "cpp") return "C/C++";
     if (representation === "surface") return "Surface";
     if (representation === "internal") return "Internal";
     if (representation === "typed") return "Fully-Typed";
     return representation;
   }

   function availableDiffRepresentations() {
     return ["cpp", "surface", "internal", "typed"].filter(function (representation) {
       return diffStrings[representation] !== undefined && diffStrings[representation] !== "";
     });
   }

   function renderDiff(representation) {
     selectedDiffRepresentation = representation;
     var targetElement = document.getElementById('diffDiv');
     targetElement.innerHTML = "";
     var configuration = {
         inputFormat: 'json',
         drawFileList: false,
         // fileListToggle: false,
         // fileListStartVisible: false
         fileContentToggle: false,
         matching: 'lines',
         outputFormat: 'side-by-side',
         synchronisedScroll: true,
         highlight: false,
         renderNothingWhenEmpty: false,
         // LATER tune?
         // matchWordsThreshold : similarity threshold for word matching, default is 0.25
         // matchWordsThresholdmatchingMaxComparisons: perform at most this much comparisons for line matching a block of changes, default is 2500
         // maxLineSizeInBlockForComparison: maximum number os characters of the bigger line in a block to apply comparison, default is 200
         // maxLineLengthHighlight: only perform diff changes highlight if lines are smaller than this, default is 10000
         };
     var diff2htmlUi = new Diff2HtmlUI(targetElement, diffStrings[representation] || "", configuration);
     diff2htmlUi.draw();
     highlightRenderedDiff(targetElement, function () {
       diff2htmlUi.highlightCode();
     });
   }

   function highlightRenderedDiff(targetElement, fallback) {
     if (!window.OptitrustSyntaxHighlight) {
       fallback();
       return;
     }
     window.OptitrustSyntaxHighlight.highlightDiff(targetElement).catch(function (error) {
       console.warn("OptiTrust syntax highlighting failed; using Diff2Html fallback.", error);
       fallback();
     });
   }

   function initDiffRepresentationSelector() {
     var representations = availableDiffRepresentations();
     var controls = document.getElementById("diffControls");
     if (representations.length <= 1) {
       controls.style.display = "none";
       return;
     }
     controls.innerHTML = representations.map(function (representation) {
       var checked = representation === selectedDiffRepresentation ? " checked" : "";
       return "<label class='diff-representation-choice'>" +
         "<input type='radio' name='diffRepresentation' value='" + representation + "'" + checked + ">" +
         diffLabel(representation) +
         "</label>";
     }).join("");
     controls.addEventListener("change", function (event) {
       if (event.target && event.target.name === "diffRepresentation") {
         renderDiff(event.target.value);
       }
     });
   }

   document.addEventListener('DOMContentLoaded', function () {
     initDiffRepresentationSelector();
     renderDiff(selectedDiffRepresentation);
   });
  // hide line numbers
</script>

</head>

<body>

<div id="diffControls" class="diff-representation-controls"></div>
<div id="diffDiv"></div>

</body>
</html>
